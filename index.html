<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bdnews247 Live News</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    h1 { color: #d60000; }
    .news-item { margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 5px; box-shadow: 0 0 5px #ccc; }
    .news-item h3 { margin: 0; color: #333; }
    .news-item p { margin: 5px 0 0; color: #555; }
  </style>
</head>
<body>
  <h1>bdnews247 Live News</h1>
  <div id="news">Loading news...</div>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    const dbRef = firebase.database().ref("news");
    dbRef.once("value", (snapshot) => {
      const newsContainer = document.getElementById("news");
      newsContainer.innerHTML = "";
      snapshot.forEach((childSnapshot) => {
        const newsItem = childSnapshot.val();
        const div = document.createElement("div");
        div.className = "news-item";
        div.innerHTML = `<h3>${newsItem.title}</h3><p>${newsItem.content}</p>`;
        newsContainer.appendChild(div);
      });
    });
  </script>
</body>
</html>
