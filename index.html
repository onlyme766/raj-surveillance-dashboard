<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bdnews247</title>

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6931965126230412"
     crossorigin="anonymous"></script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQEZ0WIG92RzwI6e6TnBmTp4MgrYSMLBs",
      authDomain: "news247-64290.firebaseapp.com",
      databaseURL: "https://news247-64290-default-rtdb.firebaseio.com",
      projectId: "news247-64290",
      storageBucket: "news247-64290.appspot.com",
      messagingSenderId: "86736515101",
      appId: "1:86736515101:web:061d198e92e4b46c3956f4",
      measurementId: "G-BK7QNFZT96"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, "news"), (snapshot) => {
      const newsList = snapshot.val();
      document.getElementById("news-feed").innerHTML = Object.values(newsList)
        .map(item => `<h3>${item.title}</h3><p>${item.content}</p>`)
        .join("");
    });
  </script>

  <style>
    body {

    }

</head>
